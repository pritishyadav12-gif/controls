<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pika Control</title>
  <script>
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
  <script type="module" crossorigin src="/controls/assets/index-nDjF4Xd1.js"></script>
  <link rel="stylesheet" crossorigin href="/controls/assets/index-B8BLhg1w.css">
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loader"></div>
      <p>Connecting to Pika...</p>
    </div>

    <div id="login-screen" class="hidden">
      <div class="login-card">
        <div class="login-header">
          <h1>Pika</h1>
          <p>Client Control Panel</p>
        </div>
        <div id="login-error" class="hidden"></div>
        <form id="login-form">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" value="3Qi" autocomplete="off" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" value="Admin3Qi" />
          </div>
          <button type="submit" id="login-btn">Connect</button>
        </form>
        <div id="hw-status" class="hw-status">
          <span id="hw-badge" class="badge unknown">Checking HWID...</span>
        </div>
        <div class="advanced-section">
          <button id="advanced-toggle" class="advanced-toggle">Advanced</button>
          <div id="advanced-panel" class="hidden">
            <div class="input-group">
              <label>Custom API URL (optional)</label>
              <input type="text" id="custom-api-url" placeholder="http://localhost:3001" />
            </div>
            <button id="custom-url-btn" class="btn secondary small">Use Custom URL</button>
          </div>
        </div>
      </div>
    </div>

    <div id="main-screen" class="hidden">
      <header>
        <div class="header-left">
          <h1 class="logo">Pika</h1>
          <span class="version" id="version-text">v1.21.10</span>
        </div>
        <div class="header-center">
          <div class="tabs">
            <button class="tab active" data-tab="modules">Modules</button>
            <button class="tab" data-tab="configs">Configs</button>
          </div>
        </div>
        <div class="header-right">
          <div class="connection-status" id="connection-status">
            <span class="dot connected"></span>
            <span>Connected</span>
          </div>
        </div>
      </header>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search modules..." />
        <div class="filter-tabs" id="filter-tabs"></div>
      </div>

      <main id="modules-tab" class="tab-content active">
        <div id="modules-grid" class="modules-grid"></div>
      </main>

      <main id="configs-tab" class="tab-content">
        <div class="configs-panel">
          <div class="config-actions">
            <button id="save-config-btn" class="btn primary">Save Current</button>
            <button id="refresh-configs-btn" class="btn secondary">Refresh</button>
          </div>
          <div id="current-config" class="current-config">
            <span class="label">Current:</span>
            <span id="current-config-name" class="value">default</span>
          </div>
          <div id="configs-list" class="configs-list"></div>
        </div>
      </main>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-module-name">Module</h2>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>
  </div>
</body>
</html>
